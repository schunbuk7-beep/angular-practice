<div>
  <h2>Edit Task</h2>

  <form [formGroup]="editForm" (ngSubmit)="onSubmit()">

    <label>Task Title:</label><br>
    <input
      type="text"
      formControlName="title"
    /><br>

    <small *ngIf="editForm.get('title')?.invalid && editForm.get('title')?.touched">
      ⚠️ Task title is required.
    </small><br><br>

 <div class="btn-group">
  <button type="submit" [disabled]="editForm.invalid">
    Save Task
  </button>

  <button type="button" (click)="onCancel()">
    Cancel
  </button>
</div>
<div *ngIf="showNotification" style="
  background: linear-gradient(135deg, #1a0533, #2d1b69);
  color: #a78bfa;
  border: 1px solid #7c3aed;
  padding: 14px 20px;
  margin-top: 20px;        
  margin-bottom: 20px;
  border-radius: 10px;
  font-weight: 600;
  text-align: center;
  letter-spacing: 0.5px;">
  ✏️ Task updated successfully!
</div>
  </form>
</div>
