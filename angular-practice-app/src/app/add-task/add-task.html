<div>
    <h2>Add New Task</h2>

    <div *ngIf="showAlert">
            ✅ Task added successfully!
    </div>
    <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
        <label>Task Title:</label><br>
        <input
        type="text"
        name="taskTitle"
        formControlName="taskTitle"
        /><br>

        <small  *ngIf="taskForm.get('taskTitle')?.invalid && taskForm.get('taskTitle')?.touched">
            ⚠️ Task title is required.
        </small>
        <button type="submit" [disabled]="taskForm.invalid">Add Task</button>

        <div *ngIf="showAlert style="
         background: #d4edda;
  color: #155724;
  padding: 12px 20px;
  margin: 10px;
  border-radius: 8px;
  font-weight: bold;
  text-align: center;>
 ✅ Task added successfully!</div>
    </form>
</div>
