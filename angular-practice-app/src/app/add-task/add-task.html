<div>
  <h2>Add New Task</h2>

  <!-- ✅ only one notification div -->
  <div *ngIf="showAlert" style="
    background: linear-gradient(135deg, #065f46, #047857);
    color: #d1fae5;
    padding: 12px 20px;
    margin-bottom: 16px;
    border-radius: 8px;
    font-weight: bold;
    text-align: center;">
    ✅ Task added successfully!
  </div>

  <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">

    <label>Task Title:</label><br>
    <input
      type="text"
      formControlName="taskTitle"
    /><br>

    <small *ngIf="taskForm.get('taskTitle')?.invalid && taskForm.get('taskTitle')?.touched">
      ⚠️ Task title is required.
    </small><br><br>

    <button type="submit" [disabled]="taskForm.invalid">
      Add Task
    </button>

  </form>
</div>
